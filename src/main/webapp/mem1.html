<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamUP 로그인 페이지 재현</title>
    <style>
        /* 기본 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: #ffffff; color: #333; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* 헤더 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }
        .logo { color: #00aef0; font-size: 24px; font-weight: bold; display: flex; align-items: center; }
        .logo span { border: 2px solid #00aef0; border-radius: 50%; padding: 2px 8px; margin-right: 5px; }
        
        nav ul { display: flex; gap: 30px; font-size: 14px; font-weight: 500; }
        
        .header-right { display: flex; align-items: center; gap: 20px; font-size: 14px; }
        .btn-login-top {
            background-color: #00aef0;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
        }

        /* 메인 컨텐츠 */
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 40px;
        }
        .content-wrapper {
            display: flex;
            width: 1000px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        /* 왼쪽 배너 구역 */
        .banner-section {
            flex: 1;
            background-color: #00aef0;
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .banner-text h2 { font-size: 18px; font-weight: 300; margin-bottom: 10px; opacity: 0.9; }
        .banner-text p { font-size: 24px; font-weight: bold; line-height: 1.4; }
        .banner-img { margin-top: 40px; text-align: center; }
        /* 간단한 일러스트 대체용 아이콘 형태 */
        .banner-img div { width: 200px; height: 150px; background: rgba(255,255,255,0.2); margin: 0 auto; border-radius: 10px; }

        /* 오른쪽 로그인 폼 구역 */
        .login-section {
            flex: 1;
            padding: 60px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-section h2 { text-align: center; font-size: 24px; margin-bottom: 40px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 8px; color: #666; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
            font-size: 14px;
        }
        .input-group input:focus { border-color: #00aef0; }

        .btn-login-main {
            width: 100%;
            padding: 15px;
            background-color: #00aef0;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: #888;
        }
        .find-pw {
            display: block;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .sign-up {
            border: 1px solid #ddd;
            padding: 10px;
            display: block;
            border-radius: 5px;
            color: #00aef0;
            font-weight: bold;
        }

        /* 오른쪽 사이드바 */
        .side-menu {
            position: fixed;
            right: 30px;
            bottom: 50px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .side-btn {
            background: white;
            border: 1px solid #eee;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 13px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            font-weight: 500;
        }
        .side-btn.blue { background: #00aef0; color: white; border: none; }
        .side-btn.blue span { display: block; font-size: 10px; font-weight: normal; }

    </style>
</head>
<body>

    <header>
        <div class="logo"><span>UP</span> teamUP</div>
        <nav>
            <ul>
                <li><a href="#">제품 소개</a></li>
                <li><a href="#">서비스 요금</a></li>
                <li><a href="#">고객사례</a></li>
                <li><a href="#">체험 및 다운로드</a></li>
                <li><a href="#">News</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <a href="#">도입문의</a>
            <a href="#" class="btn-login-top">LOGIN +</a>
        </div>
    </header>

    <main>
        <div class="content-wrapper">
            <!-- 왼쪽 배너 -->
            <section class="banner-section">
                <div class="banner-text">
                    <h2>우리회사에 딱 맞는 협업툴 팀업</h2>
                    <p>이제 기업 DNA에 맞춰<br>협업툴을 디자인하세요.</p>
                </div>
                <div class="banner-img">
                    <!-- 실제 이미지를 넣으려면 <img> 태그 사용 -->
                    <div></div>
                </div>
            </section>

            <!-- 로그인 폼 -->
            <section class="login-section">
                <h2>로그인</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <label>이메일</label>
                        <input type="email" placeholder="이메일을 입력해주세요." required>
                    </div>
                    <div class="input-group">
                        <label>비밀번호</label>
                        <input type="password" placeholder="비밀번호를 입력해주세요." required>
                    </div>
                    <button type="submit" class="btn-login-main">로그인</button>
                </form>

                <div class="login-footer">
                    <p style="margin-bottom: 10px;">비밀번호가 생각나지 않으시나요?</p>
                    <a href="#" class="find-pw">비밀번호 찾기</a>
                    
                    <p style="margin-bottom: 10px; margin-top: 20px;">팀업이 처음이신가요?</p>
                    <a href="#" class="sign-up">무료 회원가입</a>
                </div>
            </section>
        </div>
    </main>

    <!-- 사이드 메뉴 -->
    <div class="side-menu">
        <a href="#" class="side-btn blue">
            <span>팀업 체험하기</span>
            Start
        </a>
        <a href="#" class="side-btn">팀업 소개서</a>
        <a href="#" class="side-btn">도입문의</a>
    </div>

    <script>
        // 간단한 로그인 동작 예시
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.querySelector('input[type="email"]').value;
            alert(email + '님, 환영합니다!');
        });
    </script>
</body>
</html>
